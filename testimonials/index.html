<!DOCTYPE html><html lang="en"><head><meta charSet="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Dora Makszy portfolio</title><meta name="description" content="Dora Makszy portfolio"/><link rel="modulepreload" href="/assets/manifest-13b9f573.js"/><link rel="modulepreload" href="/assets/entry.client-Bh0nt5ur.js"/><link rel="modulepreload" href="/assets/chunk-5KNZJZUH-LWKpqoMq.js"/><link rel="modulepreload" href="/assets/root-CTATEWKi.js"/><link rel="modulepreload" href="/assets/Testimonials-BBrt1lCp.js"/><link rel="stylesheet" href="/assets/root-GErwPdDh.css"/><link rel="stylesheet" href="/assets/Testimonials-BIpAWdhX.css"/></head><body><div class="page"><nav class=""><button id="menuToggle" aria-label="Toggle menu" aria-expanded="false">☰</button><div class="mobile-menu"><ul id="menuList"><li><a href="/" data-discover="true">Home</a></li><li><a href="/publications" data-discover="true">Publications</a></li><li><a href="/speaking" data-discover="true">Speaking</a></li><li><a href="/testimonials" data-discover="true">Testimonials</a></li><li><a href="/cv" data-discover="true">CV</a></li><li><a href="/prototype" data-discover="true">Scalable test suite</a></li></ul></div><div class="theme-switch"><input id="themeToggle" class="theme-switch__input" type="checkbox"/><label class="theme-switch__label" for="themeToggle"><span class="theme-switch__slider"></span></label></div></nav><main class="content testimonials-page"><section class="card"><h1>Testimonials</h1><section class="testimonials-section"><figure class="testimonial"><blockquote><p>Dora is a bright and talented product designer whom I had the pleasure to manage for the past year. She possesses the uncommon ability to see beyond the pixels and focus on outcomes rather than outputs. She truly strives to understand the impact that her work will have on our customers&#x27; experiences, which tremendously helped in delivering great results.</p><p>She worked alongside other product designers, product managers, product researchers, and engineers on very complicated topics, due to the inherent nature of our projects. She consistently delivered work that was praised by all her stakeholders, often going above and beyond the expectations that were set.</p><p>Finally, she is a force to be reckoned with when it comes to documentation and building processes. She is well-versed in product design best practices and it shows. That has been critical for us when establishing our product design team from scratch.</p></blockquote><figcaption>— <!-- -->Jonathan Gall<!-- -->, Chief Product Officer</figcaption></figure><figure class="testimonial"><blockquote><p>I have worked with 100s of designers throughout my career and it&#x27;s rare to find a talent like Dora. Not only does she have an outstanding level of craft and creativity, but she has a management style that truly fosters an environment of growth and positivity.</p><p>She ensures that everyone is included and brings constructive feedback, she always turns issues into opportunities and she&#x27;s an extremely strong link between product and tech, ensuring that designs are both feasible to build and pleasant for people to use. She loves to use research to inform, test and validate ideas and flows. Honestly couldn&#x27;t recommend her highly enough!</p></blockquote><figcaption>— <!-- -->Christian Hartmann<!-- -->, Senior UX researcher</figcaption></figure><figure class="testimonial"><blockquote><p>I had the pleasure of working closely with Dora for over a year, and I am truly impressed with her exceptional qualities. Dora is not just an excellent team worker; she&#x27;s someone who elevates the entire team&#x27;s performance. Her ability to take the lead on new projects showcases her proactive and innovative approach to challenges.</p><p>Dora&#x27;s talent shines through in her exceptional skills in conducting meetings. The way she manages and facilitates discussions is both admirable and highly productive. Her leadership in these settings significantly contributes to the success of our collaborative efforts. One of Dora&#x27;s standout qualities is her commitment to continuous improvement.</p><p>She proactively seeks feedback and, commendably, takes swift and effective action on the feedback received. This quality not only demonstrates her dedication to personal growth but also significantly contributes to the team&#x27;s success. What sets Dora apart is her unwavering availability and willingness to support the team. Regardless of the challenges we face, Dora is always ready to lend a hand and ensure that we collectively achieve the best results. I wholeheartedly recommend Dora for any collaborative and challenging work environment.</p><p>Her outstanding teamwork, leadership, and commitment to excellence make her an invaluable asset to any team.</p></blockquote><figcaption>— <!-- -->Alex Amoroso, PhD<!-- -->, Senior UX researcher</figcaption></figure><figure class="testimonial"><blockquote><p>Dora excels in developing design concepts that exceed expectations and measurably enhancing user experience. Her adaptability and eagerness to embrace new challenges, coupled with her rapid completion of projects, are truly commendable. Dora fostered collaborative discussions that accelerated our iteration process, resolved issues early, and expedited handovers to our development team.</p><p>Furthermore, Dora is a natural leader. Her problem- solving skills are evident not only in her design work but also in her innovative approaches to broader project challenges. In addition to her professional skills, Dora&#x27;s positive attitude and team spirit consistently uplift those around her, making her an invaluable asset to any team.</p></blockquote><figcaption>— <!-- -->Nicolas Piepenstock<!-- -->, Senior Product Manager</figcaption></figure><figure class="testimonial"><blockquote><p>What a big pleasure to work with Dora! She is a talented person and super-professional. I learnt a lot from her when it comes to Design process. She has amazing skills to design, structure flows and she can explain you on the easiest way that a non-designer person (like me) will understand completely. Whatever you build, you can count on Dora&#x27;s expertise and her feedback is always super valuable.</p><p>Thank you so much Dora for all the knowledge and help me you gave me! That helped me a lot to grow professionally, as well personally.</p></blockquote><figcaption>— <!-- -->Tayzer Damasceno<!-- -->, Data Analyst and Researcher</figcaption></figure><figure class="testimonial"><blockquote><p>For me Dora has been one of the most inspiring and supportive partners inside the challenging organisation of Futurehome. I collaborated closely with Dora in forming an ecosystem of tools and licences for the product design team to perform productively, and stay ahead of the competition. Dora showed interest in my particular needs as a prototyper; she effectively conducted research and consulted me on possible tools we could introduce to improve my workflow.</p><p>She has introduced the company to weekly Design Critiques, and has been an incredible facilitator for each one of them providing designers with actionable ways to improve their designs. Most importantly, Dora raised awareness to key stakeholders about Design; she led company-wide presentations and made plans to establish class-leading design operations, supporting the design team to operate at its maximum potential with workflows based on state of-the-art methodologies and principles, building bridges between different departments with openness, honesty and integrity.</p><p>I was fascinated when she onboarded several outsourced designers to work temporarily on a project; She supported them with all required knowledge and tools, ensuring they deliver on time high quality outputs, have all the support they need and access to key stakeholders.  She didn’t shy away from getting her hands ‘dirty’ either; She has actively demonstrated high problem solving skills, producing wireframes and high-fidelity designs by utilising our internal design system. She managed to extract knowledge from our engineers and deliver functioning design proposals and prototypes on demanding IoT systems.</p><p>Concluding, Dora has made a significant impact on my career and she has raised my expectations when it comes to Design and Design Operations. I consider Dora to be a highly valuable asset for any organisation seeking to increase the quality of their design outputs, and to establish firmer connections between design, engineering and other departments that are key for bringing valuable products into the market.</p></blockquote><figcaption>— <!-- -->Konstantinos Partheniadis<!-- -->, Senior Product Designer (Prototyper)</figcaption></figure><figure class="testimonial"><blockquote><p>Dora was organized, communicative and open to ideas of how the class could be different each time. I was particularly impressed by Dora&#x27;s ability to teach and mentor while also being a PM for the design team at her company. Dora greatly influenced the students and coached them for success in their prospective workplaces.</p></blockquote><figcaption>— <!-- -->Alaa Salim<!-- -->, Teaching Assistant</figcaption></figure></section></section></main><footer class="footer"><p>© 2025 Dora Makszy |<!-- --> <a href="mailto:makszydorka@pm.me" class="link">Contact</a></p></footer></div><script>((storageKey2, restoreKey) => {
